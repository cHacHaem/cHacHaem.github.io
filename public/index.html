<!doctype html>
<html lang="en">
<head>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js" type="text/javascript"></script>
 <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
      <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  <meta charset="UTF-8">
  <title>YAAAAAAAAAAAAAAAAAS</title>
  <link rel="stylesheet" href="style.css">


</head>
<body>
  <script type="importmap">
  {
    "imports": {
       "enable3d": "https://cdn.jsdelivr.net/gh/enable3d/enable3d/",
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/+esm",
      "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
    }
  }
</script>
  <a-scene>
    
<video id="webcam" width="640px" height="640px" autoplay></video>
<a-assets>
  
  <canvas id="my-canvas" style="border-style: solid;" crossorigin="anonymous" width="640px" height="640px"></canvas>
</a-assets>

       <a-entity environment="preset: forest"></a-entity>

    <a-sphere draw position="0 5 0" id="player" repeat="2" radius="0.95" roughness="0" wasd-controls="enabled: true">
      <a-gltf-model src="https://cdn.glitch.global/5d13bbfe-e20d-4c1a-bf02-79e4ee8de62c/sweater.glb?v=1713021429219" position="0 0 -0.5" scale="2 2 2" ></a-gltf-model>
     <a-camera id="cam" position="0 0 5" wasd-controls="enabled: false" look-controls="enabled: false"></a-camera>
    </a-sphere>
 
    </a-scene>
  <input class="chatInput" id="chatBox">
  <div class="chatMessages" id="chatDiv">
  </div>
  <script type="text/javascript"></script>
  <script src="https://code.jquery.com/jquery-2.2.2.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
   
  <script src="/main.js" type="module"></script>
 
   
</body>
</html>
