<!DOCTYPE html>
<html> 
  <head>
    <title>Processing.JS inside Webpages: Template</title> 
  </head>
  <body>
	<!--This draws the canvas on the webpage -->
    <canvas id="mycanvas"></canvas> 
  </body>
 
  <!-- Include the processing.js library -->
  <!-- See https://khanacademy.zendesk.com/hc/en-us/articles/202260404-What-parts-of-ProcessingJS-does-Khan-Academy-support- for differences -->
  <script src="https://cdn.jsdelivr.net/processing.js/1.4.8/processing.min.js"></script> 
  <script>
  var programCode = function(processingInstance) {
    with (processingInstance) {
      size(850, 400); 
      frameRate(30);
        
      // Paste code from Khan A
var spriteY = 200;
var spriteX = 400;

var drawHouse = function(x, y, name) {
    fill(0, 4, 255);
    rect(x, y, 150, 100);
    triangle(x, y, x+75, y-65, x+150, y);
    
    fill(47, 255, 0);
    textSize(20);
    text(name, x, y+2, 150, 109);
    
};
draw = function() {
    background(20, 184, 50);
    drawHouse(200, 200, "Add A shop Using the google form above");
    ellipse(spriteX, spriteY, 20, 20);
    rect(spriteX-15, spriteY+10, 30, 45);
    line(spriteX-15, spriteY+20, spriteX-30, spriteY+10);
    line(spriteX+16, spriteY+20, spriteX+30, spriteY+10);
    
    if(keyIsPressed) {
        //down
        if(keyCode === 40) {
            spriteY = spriteY+1;   
        }
        // left
        if(keyCode === 37) {
            spriteX = spriteX-1;   
        }
        // right
        if(keyCode === 39) {
            spriteX = spriteX+1;   
        }
        //up
        if(keyCode === 38) {
            spriteY = spriteY-1;   
        }
        
    }
    
};






    }};

  // Get the canvas that ProcessingJS will use
  var canvas = document.getElementById("mycanvas"); 
  // Pass the function to ProcessingJS constructor
  var processingInstance = new Processing(canvas, programCode); 
  </script>
</html>
