<!DOCTYPE html>
<html lang="en">
  <head>
<meta name="google-site-verification" content="6sDBLd2nRXbEF36gWPgz0GHze_Jg4B3SCGE9Fh9jm3Q" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.2/dist/aframe-physics-system.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>Mouse Trap</title>
    <meta charset="utf-8" />
  </head>
  <body>
    <h1>
      mouse game on glitch and stuff
    </h1>
    <a-scene>
      <a-assets>
        <a-asset-item
          id="mouseModel"
          src="https://cdn.glitch.global/e6da15e8-96ca-4bd7-9522-2905b48a5bd0/mouse_for_emorygame%20(1).gltf?v=1700053272544"
        ></a-asset-item>
        <a-asset-item
          id="cheeseModel"
          src="https://cdn.glitch.global/e6da15e8-96ca-4bd7-9522-2905b48a5bd0/Cheese2.gltf?v=17002259711654"
        ></a-asset-item>
        <a-asset-item
          id="mouseTrapModel"
          src="https://cdn.glitch.global/e6da15e8-96ca-4bd7-9522-2905b48a5bd0/Mouse_trap.gltf?v=1700053886424"
        ></a-asset-item>
        <a-asset-item
          id="barneyModel"
          src="https://cdn.glitch.global/e6da15e8-96ca-4bd7-9522-2905b48a5bd0/model.gltf?v=1700054764940"
        ></a-asset-item>
      </a-assets>
      <a-entity
        rotation="-10 0 0"
        id="camera"
        camera
        position="0 8 33"
        cursor="rayOrigin: mouse"
      >
                <a-text
          id="gameText"
          value="GAME OVER"
          position="-500 0 -1"
          align="center"
          color="red"
          animation__enter="property: position; from: -5 0 -1; to: 0 0 -1; dur: 2000; startEvents: startaniE"
          animation__leave="property: position; from: 0 0 -1; to: -5 0 -1; dur: 2000; startEvents: startaniL"
        ></a-text>
        <a-text
          id="startButton"
          position="-1.5 0.75 -1"
          value="Start Game"
          color="orange"
          geometry="primitive:plane; width: 1.4; height: 0.1"
          align="left"
          width="3"
          material="color: green"
        ></a-text>
      </a-entity>
      <a-entity
        gltf-model="#mouseModel"
        position="0 0 23"
        id="mouse"
        scale="4 4 4"
        static-body="shape: box"
rotation="0 -90 0"
        animation="property: rotation; dur: 500 from: 0 -90 0; to: 0 90 0; startEvents: rotateNow"
      >
      </a-entity>
      <a-box
        position="0 -1 0"
        scale="50 1 50"
        color="green"
        id="ground"
        static-body="shape: box"
      ></a-box>
      <a-entity
        id="cheese"
        position="0 0 -24"
        gltf-model="#cheeseModel"
        dynamic-body="shape: box; mass: 2"
        scale="6 6 6"
        rotation="0 100 0"
      ></a-entity>
      <a-entity
        gltf-model="#mouseTrapModel"
        scale="5 5 5"
        position="10 0 0"
        visible="true"
        id="mouseTrap"
        dynamic-body="shape: box; mass: 2"
      ></a-entity>
      <a-entity
        gltf-model="#mouseTrapModel"
        scale="5 5 5"
        position="-10 0 0"
        id="mouseTrap1"
        dynamic-body="shape: box; mass: 2"
      ></a-entity>
      <a-entity
        gltf-model="#mouseTrapModel"
        scale="5 5 5"
        position="-18 0 0"
        id="mouseTrap2"
        dynamic-body="shape: box; mass: 2"
      ></a-entity>
      <a-entity
        gltf-model="#mouseTrapModel"
        scale="5 5 5"
        position="0 0 0"
        id="mouseTrap3"
        dynamic-body="shape: box; mass: 2"
      ></a-entity>
    </a-scene>
    <main></main>
    <script src="script.js"></script>
  </body>
</html>
