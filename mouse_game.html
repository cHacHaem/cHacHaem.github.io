<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.8.0/addons/p5.sound.min.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css">
    <meta charset="utf-8" />

  </head>
  <body>
    <a-scene>
      <a-entity rotation="-10 0 0" id="camera" camera position="0 8 30" cursor="rayOrigin: mouse"></a-entity>
      <a-box id="mouse" scale="1 1 1" animation="property: position; from: 0 0 0; to: 0 20 5; dur: 5000; autoplay: true; loop: false; startEvents: move"></a-box>
      <a-box position="0 -1 0" scale="50 1 50" color="green"  id="ground"></a-box>
      <a-box id="mouseTrap"></a-box>
        <a-box id="mouseTrap1"></a-box>
        <a-box id="mouseTrap2"></a-box>
        <a-box id="mouseTrap3"></a-box>
    </a-scene>
    <main>
    </main>
    <script src="other.js"></script>
  </body>
</html>
